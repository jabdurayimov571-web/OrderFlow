{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>OrderFlow — Menyu</title>
  <link rel="stylesheet" href="{% static 'web/menu.css' %}">
</head>
<body data-token="{{ token }}">
  <header class="app-header">
    <div class="brand">🍔 OrderFlow</div>
    <div id="tableBadge" class="table-badge">…</div>
  </header>

  <main class="container">
    <div id="loading" class="state">Menyu yuklanmoqda…</div>
    <div id="error" class="state state--error" hidden></div>
    <div id="menu" class="menu" hidden></div>
  </main>

  <!-- Pastki savat paneli -->
  <button id="cartBar" class="cart-bar" hidden>
    <span class="cart-bar__count" id="cartCount">0</span>
    <span class="cart-bar__label">Savatni ko'rish</span>
    <span class="cart-bar__total" id="cartTotal">0 so'm</span>
  </button>

  <!-- Taom tanlash oynasi -->
  <div id="itemSheet" class="sheet" hidden>
    <div class="sheet__backdrop" data-close></div>
    <div class="sheet__panel" id="itemSheetPanel"></div>
  </div>

  <!-- Savat oynasi -->
  <div id="cartSheet" class="sheet" hidden>
    <div class="sheet__backdrop" data-close></div>
    <div class="sheet__panel" id="cartSheetPanel"></div>
  </div>

  <!-- Jonli status oynasi -->
  <div id="status" class="status" hidden>
    <div class="status__box" id="statusBox"></div>
  </div>

  <script src="{% static 'web/menu.js' %}"></script>
</body>
</html>
