{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OrderFlow — Boshqaruv</title>
  <link rel="stylesheet" href="{% static 'web/dashboard.css' %}?v=2">
</head>
<body>
  <!-- Login -->
  <div id="login" class="login">
    <form id="loginForm" class="login__box">
      <h1>📊 Boshqaruv</h1>
      <div class="field"><label>Login</label><input id="username" autocomplete="username" required></div>
      <div class="field"><label>Parol</label><input id="password" type="password" autocomplete="current-password" required></div>
      <div id="loginError" class="login__error" hidden></div>
      <button class="btn btn--primary btn--block" type="submit">Kirish</button>
    </form>
  </div>

  <!-- Dashboard -->
  <div id="board" hidden>
    <header class="bar">
      <div class="bar__title">📊 OrderFlow — Boshqaruv paneli</div>
      <div class="bar__right">
        <span id="who" class="bar__who"></span>
        <button id="logout" class="btn btn--ghost">Chiqish</button>
      </div>
    </header>
    <div class="wrap">
      <div class="cards" id="cards"></div>
      <div class="grid2">
        <div class="panel"><h3>Oxirgi 7 kun (savdo)</h3><div id="chart" class="chart"></div></div>
        <div class="panel"><h3>Top taomlar</h3><div id="top"></div></div>
      </div>
      <div class="panel"><h3>Holatlar bo'yicha</h3><div id="statuses" class="statuses"></div></div>
    </div>
  </div>

  <script src="{% static 'web/dashboard.js' %}?v=2"></script>
</body>
</html>
